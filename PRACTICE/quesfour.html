<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>

    <style>
        /* Background grid (10px × 10px) */
        body {
            background-image: 
                linear-gradient(to right, #ccc 1px, transparent 1px),
                linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* Main container */
        .container {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            position: relative; /* important for positioning inside */
        }

        /* Bottom Right box */
        .inner-box {
            width: 100px;
            height: 50px;
            border: 2px solid blue;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="inner-box">
            Bottom Right
        </div>
    </div>

</body>
